<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Consumers - Swantara Gate</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.metroui.org.ua/current/metro.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/nprogress/0.2.0/nprogress.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.10.1/sweetalert2.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/select2/4.1.0-rc.0/css/select2.min.css">
    <link rel="stylesheet" href="/assets/css/app.css">
    <link rel="stylesheet" href="/assets/css/components.css">
    <link rel="stylesheet" href="/assets/css/datatables.css">
    <link rel="stylesheet" href="/assets/css/animations.css">
    <link rel="stylesheet" href="/assets/css/dark.css">
    <link rel="stylesheet" href="/assets/css/swal-custom.css">
    <style>
        .content-card { background: var(--surface); border-radius: var(--radius-lg); border: 1px solid var(--border-subtle); overflow: hidden; }
        .card-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--border-subtle); background: var(--bg-secondary); }
        .card-header-left { display: flex; align-items: center; gap: 12px; }
        .card-icon { width: 40px; height: 40px; border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center; font-size: 16px; }
        .card-icon.bg-primary { background: rgba(74, 144, 226, 0.12); color: var(--accent); }
        .card-header h3 { margin: 0; font-size: 14px; font-weight: 600; }
        .card-subtitle { margin: 0; font-size: 12px; color: var(--text-tertiary); }
        .card-body { padding: 0; }
        .data-table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        thead { background: var(--bg-secondary); }
        th { padding: 12px 16px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-tertiary); text-align: left; white-space: nowrap; }
        td { padding: 14px 16px; font-size: 13px; border-bottom: 1px solid var(--border-subtle); vertical-align: middle; }
        tbody tr:hover { background: var(--bg-secondary); }
        tbody tr:last-child td { border-bottom: none; }
        .consumer-avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--accent); color: white; display: flex; align-items: center; justify-content: center; font-weight: 600; font-size: 14px; }
        .consumer-info { display: flex; align-items: center; gap: 12px; }
        .consumer-details h4 { font-size: 13px; font-weight: 600; margin: 0; }
        .consumer-details p { font-size: 11px; color: var(--text-tertiary); margin: 2px 0 0; }
        .consumer-key { font-family: 'SF Mono', 'Consolas', monospace; font-size: 11px; color: var(--text-secondary); background: var(--bg-secondary); padding: 2px 6px; border-radius: 4px; }
        .badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; }
        .badge-success { background: #e8f5e9; color: #2e7d32; }
        .badge-danger { background: #ffebee; color: #c62828; }
        .badge-warning { background: #fff3e0; color: #e65100; }
        .badge-primary { background: #e3f2fd; color: #1565c0; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 9999; display: none; align-items: center; justify-content: center; animation: fadeIn 0.2s ease; }
        .modal-overlay.active { display: flex; }
        .modal-box { background: var(--surface); border-radius: var(--radius-lg); width: 100%; max-width: 500px; box-shadow: 0 20px 60px rgba(0,0,0,0.2); animation: slideUp 0.25s ease; overflow: hidden; }
        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 18px 24px; border-bottom: 1px solid var(--border-subtle); background: var(--bg-secondary); }
        .modal-header h3 { margin: 0; font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 10px; }
        .modal-header h3 i { color: var(--accent); }
        .modal-body { padding: 24px; max-height: 70vh; overflow-y: auto; }
        .modal-footer { display: flex; justify-content: flex-end; gap: 10px; padding: 16px 24px; border-top: 1px solid var(--border-subtle); background: var(--bg-secondary); }
        .form-row { margin-bottom: 16px; }
        .form-row:last-child { margin-bottom: 0; }
        .form-group { display: flex; flex-direction: column; }
        .form-group label { font-size: 12px; font-weight: 500; color: var(--text-secondary); margin-bottom: 6px; }
        .form-group .form-control { height: 38px; font-size: 13px; }
        .form-group textarea.form-control { height: auto; min-height: 80px; resize: vertical; }
        .form-row-inline { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .switch-toggle { position: relative; display: inline-block; width: 40px; height: 22px; }
        .switch-toggle input { opacity: 0; width: 0; height: 0; }
        .switch-slider { position: absolute; inset: 0; background: var(--border); border-radius: 22px; cursor: pointer; transition: var(--transition-fast); }
        .switch-slider::before { content: ''; position: absolute; width: 16px; height: 16px; left: 3px; bottom: 3px; background: white; border-radius: 50%; transition: var(--transition-fast); }
        .switch-toggle input:checked + .switch-slider { background: var(--success); }
        .switch-toggle input:checked + .switch-slider::before { transform: translateX(18px); }
        .switch-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border-subtle); }
        .switch-row:last-child { border-bottom: none; }
        .switch-row span { font-size: 13px; color: var(--text-primary); }
        .empty-state { text-align: center; padding: 60px 20px; color: var(--text-tertiary); }
        .empty-state i { font-size: 48px; margin-bottom: 16px; opacity: 0.4; }
        .empty-state h4 { font-size: 16px; color: var(--text-secondary); margin-bottom: 6px; }
        .empty-state p { font-size: 13px; margin: 0; }
        .table-loading { text-align: center; padding: 40px; color: var(--text-tertiary); }
        .table-loading i { font-size: 24px; animation: fa-spin 1s linear infinite; margin-bottom: 10px; display: block; }
    </style>
</head>
<body>
    <div class="app-container">
        <div id="sidebar-container"></div>
        <div class="app-main">
            <div id="navbar-container"></div>
            <main class="app-content">
                <div class="page-header">
                    <div>
                        <h1>API Consumers</h1>
                        <p>Manage API consumer applications and credentials</p>
                    </div>
                    <div style="display: flex; gap: 10px;">
                        <button class="btn btn-secondary" onclick="loadConsumers()"><i class="fa-solid fa-arrows-rotate"></i> <span>Refresh</span></button>
                        <button class="btn btn-primary" onclick="openAddModal()"><i class="fa-solid fa-plus"></i> Add Consumer</button>
                    </div>
                </div>

                <!-- Consumers Table -->
                <div class="content-card">
                    <div class="card-header">
                        <div class="card-header-left">
                            <div class="card-icon bg-primary"><i class="fa-solid fa-users-gear"></i></div>
                            <div>
                                <h3>Consumer List</h3>
                                <p class="card-subtitle" id="consumerSubtitle">Loading...</p>
                            </div>
                        </div>
                        <div style="display: flex; align-items: center; gap: 12px;">
                            <div style="position: relative;">
                                <input type="text" id="searchInput" class="form-control" placeholder="Search consumers..." style="padding-left: 36px; width: 220px; height: 36px; font-size: 13px;" onkeyup="handleSearch()">
                                <i class="fa-solid fa-search" style="position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-tertiary); font-size: 13px;"></i>
                            </div>
                        </div>
                    </div>
                    <div class="card-body">
                        <div class="data-table-wrapper">
                            <table>
                                <thead>
                                    <tr>
                                        <th style="width:50px;">#</th>
                                        <th>Consumer</th>
                                        <th>API Key</th>
                                        <th>Auth Type</th>
                                        <th>Status</th>
                                        <th>Created</th>
                                        <th style="width:100px;">Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="consumerTableBody">
                                    <tr><td colspan="7"><div class="table-loading"><i class="fa-solid fa-spinner"></i>Loading consumers...</div></td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <!-- Pagination -->
                <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 16px; padding: 12px 0;">
                    <div class="pagination-info" id="paginationInfo">Showing 0 - 0 of 0</div>
                    <div class="pagination-buttons" id="paginationButtons"></div>
                </div>
            </main>
        </div>
    </div>

    <!-- Add/Edit Modal -->
    <div class="modal-overlay" id="consumerModal">
        <div class="modal-box">
            <div class="modal-header">
                <h3><i class="fa-solid fa-user-gear"></i> <span id="modalTitle">Add Consumer</span></h3>
                <button class="modal-close" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="modal-body">
                <form id="consumerForm">
                    <input type="hidden" id="consumerId">
                    <div class="form-row">
                        <div class="form-group">
                            <label>Consumer Name <span style="color:var(--danger);">*</span></label>
                            <input type="text" class="form-control" id="consumerName" placeholder="e.g., Mobile App, Web Dashboard">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Description</label>
                            <textarea class="form-control" id="consumerDescription" placeholder="Brief description of this consumer"></textarea>
                        </div>
                    </div>
                    <div class="form-row form-row-inline">
                        <div class="form-group">
                            <label>Auth Type</label>
                            <select class="form-control" id="consumerAuthType">
                                <option value="api_key">API Key</option>
                                <option value="jwt">JWT</option>
                                <option value="oauth2">OAuth 2.0</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Rate Limit (req/min)</label>
                            <input type="number" class="form-control" id="consumerRateLimit" value="1000" min="1">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Allowed IPs (comma separated)</label>
                            <input type="text" class="form-control" id="consumerAllowedIPs" placeholder="e.g., 192.168.1.1, 10.0.0.0/24">
                        </div>
                    </div>
                    <div class="form-row" style="margin-top: 16px;">
                        <div class="switch-row">
                            <span>Enable Consumer</span>
                            <label class="switch-toggle">
                                <input type="checkbox" id="consumerIsActive" checked>
                                <span class="switch-slider"></span>
                            </label>
                        </div>
                        <div class="switch-row">
                            <span>Enable Rate Limiting</span>
                            <label class="switch-toggle">
                                <input type="checkbox" id="consumerEnableRateLimit" checked>
                                <span class="switch-slider"></span>
                            </label>
                        </div>
                        <div class="switch-row">
                            <span>IP Whitelist Enforcement</span>
                            <label class="switch-toggle">
                                <input type="checkbox" id="consumerEnforceIPWhitelist">
                                <span class="switch-slider"></span>
                            </label>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal()"><i class="fa-solid fa-xmark"></i> Cancel</button>
                <button class="btn btn-primary" id="btnSaveConsumer" onclick="saveConsumer()"><i class="fa-solid fa-check"></i> <span id="btnSaveText">Save</span></button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdn.metroui.org.ua/current/metro.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.4/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nprogress/0.2.0/nprogress.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.10.1/sweetalert2.all.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/moment.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/select2/4.1.0-rc.0/js/select2.min.js"></script>
    <script src="/assets/js/swal-config.js"></script>
    <script src="/assets/js/app.js"></script>
    <script>
        const CONSUMER_API = '/api/admin/consumers';
        let editingId = null;
        let currentPage = 1;
        let totalPages = 1;
        let searchTimeout = null;

        function getHeaders() { return { 'Authorization': 'Bearer ' + localStorage.getItem('access_token') }; }
        function escapeHtml(t) { if (!t) return ''; return t.replace(/[&<>"']/g, function(m) { return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]; }); }

        $(document).ready(function() {
            $('#sidebar-container').load('/components/sidebar.html', function() {
                $(this).find('.nav-item').removeClass('active');
                $(this).find('a[href="/consumers.html"]').closest('.nav-item').addClass('active');
                $(this).find('a[href="/consumers.html"]').closest('.has-submenu').addClass('open');
            });
            $('#navbar-container').load('/components/navbar.html');
            if (!localStorage.getItem('access_token')) { window.location.href = '/login.html'; return; }

            // Initialize Select2
            $('#consumerAuthType').select2({ theme: 'default' });

            loadConsumers();

            // Close modal on backdrop click
            $('#consumerModal').on('click', function(e) { if (e.target === this) closeModal(); });
            $(document).on('keydown', function(e) { if (e.key === 'Escape') closeModal(); });
        });

        function loadConsumers(page = 1) {
            currentPage = page;
            $('#consumerTableBody').html('<tr><td colspan="7"><div class="table-loading"><i class="fa-solid fa-spinner"></i>Loading...</div></td></tr>');

            const search = $('#searchInput').val() || '';
            const limit = 10;

            $.ajax({
                url: CONSUMER_API,
                method: 'GET',
                headers: getHeaders(),
                data: { page: currentPage, limit: limit, search: search },
                success: function(r) {
                    if (r.success && r.data) {
                        const data = Array.isArray(r.data) ? r.data : r.data.consumers || [];
                        const pagination = r.data.pagination || {};
                        const total = pagination.total || 0;

                        renderTable(data);
                        renderPagination(pagination, search);
                        $('#consumerSubtitle').text(data.length + ' consumer(s) found');
                    } else {
                        renderEmpty();
                    }
                },
                error: function(xhr) {
                    if (xhr.status === 401) { window.location.href = '/login.html'; return; }
                    $('#consumerTableBody').html('<tr><td colspan="7" style="text-align:center;padding:20px;color:var(--danger);">Failed to load consumers</td></tr>');
                }
            });
        }

        function renderTable(consumers) {
            if (!consumers || consumers.length === 0) { renderEmpty(); return; }

            let html = '';
            consumers.forEach(function(c, i) {
                const statusBadge = c.is_active
                    ? '<span class="badge badge-success"><i class="fa-solid fa-check"></i> Active</span>'
                    : '<span class="badge badge-danger"><i class="fa-solid fa-times"></i> Inactive</span>';

                const authBadge = getAuthTypeBadge(c.auth_type);
                const initials = c.consumer_name ? c.consumer_name.substring(0, 2).toUpperCase() : 'CN';

                html += '<tr>' +
                    '<td>' + ((currentPage - 1) * 10 + i + 1) + '</td>' +
                    '<td><div class="consumer-info">' +
                        '<div class="consumer-avatar">' + initials + '</div>' +
                        '<div class="consumer-details">' +
                            '<h4>' + escapeHtml(c.consumer_name || '-') + '</h4>' +
                            '<p>' + escapeHtml(c.description || 'No description') + '</p>' +
                        '</div>' +
                    '</div></td>' +
                    '<td><span class="consumer-key">' + escapeHtml(c.api_key ? (c.api_key.length > 16 ? c.api_key.substring(0, 16) + '...' : c.api_key) : 'Not generated') + '</span></td>' +
                    '<td>' + authBadge + '</td>' +
                    '<td>' + statusBadge + '</td>' +
                    '<td><span style="font-size:12px;color:var(--text-tertiary);">' + formatDate(c.created_at) + '</span></td>' +
                    '<td><div style="display:flex;gap:6px;">' +
                        '<button class="btn btn-sm btn-secondary" title="Edit" onclick="editConsumer(' + c.id + ')"><i class="fa-solid fa-pen"></i></button>' +
                        '<button class="btn btn-sm btn-danger" title="Delete" onclick="deleteConsumer(' + c.id + ',\'' + escapeHtml(c.consumer_name) + '\')"><i class="fa-solid fa-trash"></i></button>' +
                    '</div></td>' +
                '</tr>';
            });

            $('#consumerTableBody').html(html);
        }

        function renderEmpty() {
            $('#consumerTableBody').html('<tr><td colspan="7"><div class="empty-state"><i class="fa-solid fa-users-gear"></i><h4>No Consumers Yet</h4><p>Click <strong>Add Consumer</strong> to create one</p></div></td></tr>');
            $('#consumerSubtitle').text('0 consumers');
            $('#paginationButtons').html('');
            $('#paginationInfo').text('Showing 0 - 0 of 0');
        }

        function renderPagination(pagination, search) {
            const page = pagination.page || 1;
            const total = pagination.total || 0;
            const limit = pagination.limit || 10;
            totalPages = Math.ceil(total / limit);

            const from = total === 0 ? 0 : (page - 1) * limit + 1;
            const to = Math.min(page * limit, total);

            $('#paginationInfo').text('Showing ' + from + ' - ' + to + ' of ' + total);

            let html = '';
            if (totalPages > 1) {
                html += '<button ' + (page <= 1 ? 'disabled' : '') + ' onclick="loadConsumers(' + (page - 1) + ')"><i class="fa-solid fa-chevron-left"></i></button>';
                for (let p = 1; p <= totalPages; p++) {
                    if (p === 1 || p === totalPages || (p >= page - 1 && p <= page + 1)) {
                        html += '<button class="' + (p === page ? 'active' : '') + '" onclick="loadConsumers(' + p + ')">' + p + '</button>';
                    } else if (p === page - 2 || p === page + 2) {
                        html += '<span style="padding:0 8px;color:var(--text-tertiary);">...</span>';
                    }
                }
                html += '<button ' + (page >= totalPages ? 'disabled' : '') + ' onclick="loadConsumers(' + (page + 1) + ')"><i class="fa-solid fa-chevron-right"></i></button>';
            }
            $('#paginationButtons').html(html);
        }

        function getAuthTypeBadge(type) {
            const badges = {
                'api_key': '<span class="badge badge-primary">API Key</span>',
                'jwt': '<span class="badge badge-warning">JWT</span>',
                'oauth2': '<span class="badge badge-success">OAuth 2.0</span>'
            };
            return badges[type] || '<span class="badge badge-primary">' + escapeHtml(type || 'api_key') + '</span>';
        }

        function formatDate(dateStr) {
            if (!dateStr) return '-';
            try {
                return moment(dateStr).format('MMM D, YYYY');
            } catch { return dateStr; }
        }

        function handleSearch() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(function() {
                loadConsumers(1);
            }, 300);
        }

        function openAddModal() {
            editingId = null;

            // Init Select2 if not already
            if (!$('#consumerAuthType').hasClass('select2-hidden-accessible')) {
                $('#consumerAuthType').select2({ theme: 'default' });
            }

            $('#modalTitle').text('Add Consumer');
            $('#consumerId').val('');
            $('#consumerName').val('');
            $('#consumerDescription').val('');
            $('#consumerAuthType').val('api_key').trigger('change.select2');
            $('#consumerRateLimit').val(1000);
            $('#consumerAllowedIPs').val('');
            $('#consumerIsActive').prop('checked', true);
            $('#consumerEnableRateLimit').prop('checked', true);
            $('#consumerEnforceIPWhitelist').prop('checked', false);
            $('#btnSaveText').text('Save');
            $('#btnSaveConsumer').removeClass('btn-warning').addClass('btn-primary');

            $('#consumerModal').addClass('active');
        }

        function editConsumer(id) {
            // Init Select2 if not already
            if (!$('#consumerAuthType').hasClass('select2-hidden-accessible')) {
                $('#consumerAuthType').select2({ theme: 'default' });
            }

            $.ajax({
                url: CONSUMER_API + '/' + id,
                method: 'GET',
                headers: getHeaders(),
                success: function(r) {
                    if (r.success && r.data) {
                        const c = r.data;
                        editingId = id;
                        $('#modalTitle').text('Edit Consumer');
                        $('#consumerId').val(c.id);
                        $('#consumerName').val(c.consumer_name || '');
                        $('#consumerDescription').val(c.description || '');
                        $('#consumerAuthType').val(c.auth_type || 'api_key').trigger('change.select2');
                        $('#consumerRateLimit').val(c.rate_limit || 1000);
                        $('#consumerAllowedIPs').val(c.allowed_ips || '');
                        $('#consumerIsActive').prop('checked', c.is_active !== false);
                        $('#consumerEnableRateLimit').prop('checked', c.enable_rate_limit !== false);
                        $('#consumerEnforceIPWhitelist').prop('checked', c.enforce_ip_whitelist === true);
                        $('#btnSaveText').text('Update');
                        $('#btnSaveConsumer').removeClass('btn-primary').addClass('btn-warning');
                        $('#consumerModal').addClass('active');
                    }
                },
                error: function() { showError('Error', 'Failed to load consumer data'); }
            });
        }

        function closeModal() {
            $('#consumerModal').removeClass('active');
            editingId = null;
        }

        function saveConsumer() {
            const name = $('#consumerName').val().trim();
            if (!name) { showWarning('Consumer name is required'); $('#consumerName').focus(); return; }

            const payload = {
                consumer_name: name,
                description: $('#consumerDescription').val().trim(),
                auth_type: $('#consumerAuthType').val(),
                rate_limit: parseInt($('#consumerRateLimit').val()) || 1000,
                allowed_ips: $('#consumerAllowedIPs').val().trim(),
                is_active: $('#consumerIsActive').is(':checked'),
                enable_rate_limit: $('#consumerEnableRateLimit').is(':checked'),
                enforce_ip_whitelist: $('#consumerEnforceIPWhitelist').is(':checked')
            };

            const btn = $('#btnSaveConsumer');
            const orig = btn.html();
            btn.prop('disabled', true).html('<i class="fa-solid fa-spinner fa-spin"></i> Saving...');

            const method = editingId ? 'PUT' : 'POST';
            const url = editingId ? CONSUMER_API + '/' + editingId : CONSUMER_API;

            $.ajax({
                url: url,
                method: method,
                headers: getHeaders(),
                contentType: 'application/json',
                data: JSON.stringify(payload),
                success: function() {
                    closeModal();
                    showToast(editingId ? 'Consumer updated successfully' : 'Consumer created successfully', 'success');
                    loadConsumers(currentPage);
                },
                error: function(xhr) { showError('Error', xhr.responseJSON?.message || 'Failed to save'); },
                complete: function() { btn.prop('disabled', false).html(orig); }
            });
        }

        function deleteConsumer(id, name) {
            showConfirm('Delete Consumer', 'Are you sure you want to delete "' + name + '"? This action cannot be undone.', 'Yes, Delete', 'Cancel').then(function(result) {
                if (result.isConfirmed) {
                    $.ajax({
                        url: CONSUMER_API + '/' + id,
                        method: 'DELETE',
                        headers: getHeaders(),
                        success: function() { showToast('Consumer deleted', 'success'); loadConsumers(currentPage); },
                        error: function(xhr) { showError('Error', xhr.responseJSON?.message || 'Failed to delete'); }
                    });
                }
            });
        }
    </script>
</body>
</html>
