<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Consumer Credentials - Swantara Gate</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.metroui.org.ua/current/metro.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/nprogress/0.2.0/nprogress.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.10.1/sweetalert2.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/select2/4.1.0-rc.0/css/select2.min.css">
    <link rel="stylesheet" href="/assets/css/app.css">
    <link rel="stylesheet" href="/assets/css/components.css">
    <link rel="stylesheet" href="/assets/css/datatables.css">
    <link rel="stylesheet" href="/assets/css/animations.css">
    <link rel="stylesheet" href="/assets/css/dark.css">
    <link rel="stylesheet" href="/assets/css/swal-custom.css">
    <style>
        .content-card { background: var(--surface); border-radius: var(--radius-lg); border: 1px solid var(--border-subtle); overflow: hidden; }
        .card-header { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid var(--border-subtle); background: var(--bg-secondary); }
        .card-header-left { display: flex; align-items: center; gap: 12px; }
        .card-icon { width: 40px; height: 40px; border-radius: var(--radius-md); display: flex; align-items: center; justify-content: center; font-size: 16px; }
        .card-icon.bg-warning { background: rgba(230, 81, 0, 0.12); color: #e65100; }
        .card-header h3 { margin: 0; font-size: 14px; font-weight: 600; }
        .card-subtitle { margin: 0; font-size: 12px; color: var(--text-tertiary); }
        .card-body { padding: 0; }
        .data-table-wrapper { overflow-x: auto; }
        table { width: 100%; border-collapse: collapse; }
        thead { background: var(--bg-secondary); }
        th { padding: 12px 16px; font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-tertiary); text-align: left; white-space: nowrap; }
        td { padding: 14px 16px; font-size: 13px; border-bottom: 1px solid var(--border-subtle); vertical-align: middle; }
        tbody tr:hover { background: var(--bg-secondary); }
        tbody tr:last-child td { border-bottom: none; }
        .credential-type { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; }
        .credential-type.api_key { background: #e3f2fd; color: #1565c0; }
        .credential-type.jwt { background: #fff3e0; color: #e65100; }
        .credential-type.oauth2 { background: #e8f5e9; color: #2e7d32; }
        .credential-type.basic { background: #f3e5f5; color: #6a1b9a; }
        .credential-value { font-family: 'SF Mono', 'Consolas', monospace; font-size: 11px; color: var(--text-secondary); background: var(--bg-secondary); padding: 2px 6px; border-radius: 4px; }
        .consumer-chip { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; background: var(--bg-secondary); border-radius: 12px; font-size: 12px; }
        .consumer-chip i { color: var(--accent); }
        .badge { display: inline-flex; align-items: center; gap: 4px; padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; }
        .badge-success { background: #e8f5e9; color: #2e7d32; }
        .badge-danger { background: #ffebee; color: #c62828; }
        .badge-warning { background: #fff3e0; color: #e65100; }
        .badge-primary { background: #e3f2fd; color: #1565c0; }
        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.45); z-index: 9999; display: none; align-items: center; justify-content: center; animation: fadeIn 0.2s ease; }
        .modal-overlay.active { display: flex; }
        .modal-box { background: var(--surface); border-radius: var(--radius-lg); width: 100%; max-width: 500px; box-shadow: 0 20px 60px rgba(0,0,0,0.2); animation: slideUp 0.25s ease; overflow: hidden; }
        @keyframes slideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .modal-header { display: flex; align-items: center; justify-content: space-between; padding: 18px 24px; border-bottom: 1px solid var(--border-subtle); background: var(--bg-secondary); }
        .modal-header h3 { margin: 0; font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 10px; }
        .modal-header h3 i { color: var(--accent); }
        .modal-body { padding: 24px; max-height: 70vh; overflow-y: auto; }
        .modal-footer { display: flex; justify-content: flex-end; gap: 10px; padding: 16px 24px; border-top: 1px solid var(--border-subtle); background: var(--bg-secondary); }
        .form-row { margin-bottom: 16px; }
        .form-row:last-child { margin-bottom: 0; }
        .form-group { display: flex; flex-direction: column; }
        .form-group label { font-size: 12px; font-weight: 500; color: var(--text-secondary); margin-bottom: 6px; }
        .form-group .form-control { height: 38px; font-size: 13px; }
        .form-group textarea.form-control { height: auto; min-height: 60px; resize: vertical; }
        .form-row-inline { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
        .input-with-action { display: flex; gap: 8px; }
        .input-with-action .form-control { flex: 1; }
        .btn-generate { height: 38px; padding: 0 16px; background: var(--warning); color: white; border: none; border-radius: var(--radius-sm); font-size: 12px; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: var(--transition-fast); white-space: nowrap; }
        .btn-generate:hover { background: #e69500; }
        .switch-toggle { position: relative; display: inline-block; width: 40px; height: 22px; }
        .switch-toggle input { opacity: 0; width: 0; height: 0; }
        .switch-slider { position: absolute; inset: 0; background: var(--border); border-radius: 22px; cursor: pointer; transition: var(--transition-fast); }
        .switch-slider::before { content: ''; position: absolute; width: 16px; height: 16px; left: 3px; bottom: 3px; background: white; border-radius: 50%; transition: var(--transition-fast); }
        .switch-toggle input:checked + .switch-slider { background: var(--success); }
        .switch-toggle input:checked + .switch-slider::before { transform: translateX(18px); }
        .switch-row { display: flex; align-items: center; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border-subtle); }
        .switch-row:last-child { border-bottom: none; }
        .switch-row span { font-size: 13px; color: var(--text-primary); }
        .empty-state { text-align: center; padding: 60px 20px; color: var(--text-tertiary); }
        .empty-state i { font-size: 48px; margin-bottom: 16px; opacity: 0.4; }
        .empty-state h4 { font-size: 16px; color: var(--text-secondary); margin-bottom: 6px; }
        .empty-state p { font-size: 13px; margin: 0; }
        .table-loading { text-align: center; padding: 40px; color: var(--text-tertiary); }
        .table-loading i { font-size: 24px; animation: fa-spin 1s linear infinite; margin-bottom: 10px; display: block; }
    </style>
</head>
<body>
    <div class="app-container">
        <div id="sidebar-container"></div>
        <div class="app-main">
            <div id="navbar-container"></div>
            <main class="app-content">
                <div class="page-header">
                    <div>
                        <h1>Consumer Credentials</h1>
                        <p>Manage authentication credentials for API consumers</p>
                    </div>
                    <div style="display: flex; gap: 10px;">
                        <button class="btn btn-secondary" onclick="loadCredentials()"><i class="fa-solid fa-arrows-rotate"></i> <span>Refresh</span></button>
                        <button class="btn btn-primary" onclick="openAddModal()"><i class="fa-solid fa-plus"></i> Add Credential</button>
                    </div>
                </div>

                <!-- Credentials Table -->
                <div class="content-card">
                    <div class="card-header">
                        <div class="card-header-left">
                            <div class="card-icon bg-warning"><i class="fa-solid fa-key"></i></div>
                            <div>
                                <h3>Credential List</h3>
                                <p class="card-subtitle" id="credentialSubtitle">Loading...</p>
                            </div>
                        </div>
                        <div style="display: flex; align-items: center; gap: 12px;">
                            <select id="filterConsumer" class="form-control" style="height: 36px; width: 180px;" onchange="loadCredentials(1)">
                                <option value="">All Consumers</option>
                            </select>
                            <div style="position: relative;">
                                <input type="text" id="searchInput" class="form-control" placeholder="Search..." style="padding-left: 36px; width: 200px; height: 36px; font-size: 13px;" onkeyup="handleSearch()">
                                <i class="fa-solid fa-search" style="position: absolute; left: 12px; top: 50%; transform: translateY(-50%); color: var(--text-tertiary); font-size: 13px;"></i>
                            </div>
                        </div>
                    </div>
                    <div class="card-body">
                        <div class="data-table-wrapper">
                            <table>
                                <thead>
                                    <tr>
                                        <th style="width:50px;">#</th>
                                        <th>Consumer</th>
                                        <th>Type</th>
                                        <th>Name / Key ID</th>
                                        <th>Value</th>
                                        <th>Status</th>
                                        <th style="width:100px;">Actions</th>
                                    </tr>
                                </thead>
                                <tbody id="credentialTableBody">
                                    <tr><td colspan="7"><div class="table-loading"><i class="fa-solid fa-spinner"></i>Loading...</div></td></tr>
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>

                <!-- Pagination -->
                <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 16px; padding: 12px 0;">
                    <div class="pagination-info" id="paginationInfo">Showing 0 - 0 of 0</div>
                    <div class="pagination-buttons" id="paginationButtons"></div>
                </div>
            </main>
        </div>
    </div>

    <!-- Add/Edit Modal -->
    <div class="modal-overlay" id="credentialModal">
        <div class="modal-box">
            <div class="modal-header">
                <h3><i class="fa-solid fa-key"></i> <span id="modalTitle">Add Credential</span></h3>
                <button class="modal-close" onclick="closeModal()"><i class="fa-solid fa-xmark"></i></button>
            </div>
            <div class="modal-body">
                <form id="credentialForm">
                    <input type="hidden" id="credentialId">
                    <div class="form-row">
                        <div class="form-group">
                            <label>Consumer <span style="color:var(--danger);">*</span></label>
                            <select class="form-control" id="credConsumer">
                                <option value="">-- Select consumer --</option>
                            </select>
                        </div>
                    </div>
                    <div class="form-row form-row-inline">
                        <div class="form-group">
                            <label>Credential Type <span style="color:var(--danger);">*</span></label>
                            <select class="form-control" id="credType">
                                <option value="api_key">API Key</option>
                                <option value="jwt_secret">JWT Secret</option>
                                <option value="basic_auth">Basic Auth</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Credential Name</label>
                            <input type="text" class="form-control" id="credName" placeholder="e.g., Production Key">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Username <span style="color:var(--danger);">*</span></label>
                            <input type="text" class="form-control" id="credUsername" placeholder="Enter username or identifier">
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label>Secret Value</label>
                            <div class="input-with-action">
                                <input type="password" class="form-control" id="credSecret" placeholder="Enter secret value" style="font-family: monospace;">
                                <button type="button" class="btn-generate" onclick="generateSecret()">
                                    <i class="fa-solid fa-wand-magic-sparkles"></i> Generate
                                </button>
                            </div>
                        </div>
                    </div>
                    <div class="form-row" style="margin-top: 16px;">
                        <div class="switch-row">
                            <span>Active</span>
                            <label class="switch-toggle">
                                <input type="checkbox" id="credIsActive" checked>
                                <span class="switch-slider"></span>
                            </label>
                        </div>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal()"><i class="fa-solid fa-xmark"></i> Cancel</button>
                <button class="btn btn-primary" id="btnSaveCredential" onclick="saveCredential()"><i class="fa-solid fa-check"></i> <span id="btnSaveText">Save</span></button>
            </div>
        </div>
    </div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.7.1/jquery.min.js"></script>
    <script src="https://cdn.metroui.org.ua/current/metro.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.4/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/nprogress/0.2.0/nprogress.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/sweetalert2/11.10.1/sweetalert2.all.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/moment.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/select2/4.1.0-rc.0/js/select2.min.js"></script>
    <script src="/assets/js/swal-config.js"></script>
    <script src="/assets/js/app.js"></script>
    <script>
        const CRED_API = '/api/admin/consumer-credentials';
        const CONSUMERS_API = '/api/admin/consumers';
        let editingId = null;
        let currentPage = 1;
        let totalPages = 1;
        let searchTimeout = null;
        let consumers = [];

        function getHeaders() { return { 'Authorization': 'Bearer ' + localStorage.getItem('access_token') }; }
        function escapeHtml(t) { if (!t) return ''; return t.replace(/[&<>"']/g, function(m) { return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[m]; }); }

        $(document).ready(function() {
            $('#sidebar-container').load('/components/sidebar.html', function() {
                $(this).find('.nav-item').removeClass('active');
                $(this).find('a[href="/consumer-credentials.html"]').closest('.nav-item').addClass('active');
                $(this).find('a[href="/consumer-credentials.html"]').closest('.has-submenu').addClass('open');
            });
            $('#navbar-container').load('/components/navbar.html');
            if (!localStorage.getItem('access_token')) { window.location.href = '/login.html'; return; }

            // Initialize Select2
            $('#credConsumer').select2({ theme: 'default', placeholder: '-- Select consumer --' });
            $('#credType').select2({ theme: 'default' });
            $('#filterConsumer').select2({ theme: 'default', placeholder: 'All Consumers' });

            loadConsumers();
            loadCredentials();

            // Close modal on backdrop click
            $('#credentialModal').on('click', function(e) { if (e.target === this) closeModal(); });
            $(document).on('keydown', function(e) { if (e.key === 'Escape') closeModal(); });
        });

        function loadConsumers() {
            $.ajax({
                url: CONSUMERS_API,
                method: 'GET',
                headers: getHeaders(),
                data: { limit: 200 },
                success: function(r) {
                    if (r.success && r.data) {
                        consumers = Array.isArray(r.data) ? r.data : r.data.consumers || [];

                        // Populate form dropdown
                        const $form = $('#credConsumer');
                        $form.find('option:not(:first)').remove();
                        consumers.forEach(function(c) {
                            $form.append('<option value="' + c.id + '">' + escapeHtml(c.consumer_name) + '</option>');
                        });
                        $form.trigger('change.select2');

                        // Populate filter dropdown
                        const $filter = $('#filterConsumer');
                        $filter.find('option:not(:first)').remove();
                        consumers.forEach(function(c) {
                            $filter.append('<option value="' + c.id + '">' + escapeHtml(c.consumer_name) + '</option>');
                        });
                        $filter.trigger('change.select2');
                    }
                }
            });
        }

        function loadCredentials(page = 1) {
            currentPage = page;
            $('#credentialTableBody').html('<tr><td colspan="7"><div class="table-loading"><i class="fa-solid fa-spinner"></i>Loading...</div></td></tr>');

            const search = $('#searchInput').val() || '';
            const consumerId = $('#filterConsumer').val() || '';
            const limit = 10;

            let url = CRED_API + '?page=' + currentPage + '&limit=' + limit;
            if (search) url += '&search=' + encodeURIComponent(search);
            if (consumerId) url += '&consumer_id=' + consumerId;

            $.ajax({
                url: url,
                method: 'GET',
                headers: getHeaders(),
                success: function(r) {
                    if (r.success && r.data) {
                        const data = Array.isArray(r.data) ? r.data : r.data.credentials || [];
                        const pagination = r.data.pagination || {};
                        const total = pagination.total || 0;

                        renderTable(data);
                        renderPagination(pagination);
                        $('#credentialSubtitle').text(data.length + ' credential(s) found');
                    } else {
                        renderEmpty();
                    }
                },
                error: function(xhr) {
                    if (xhr.status === 401) { window.location.href = '/login.html'; return; }
                    $('#credentialTableBody').html('<tr><td colspan="7" style="text-align:center;padding:20px;color:var(--danger);">Failed to load credentials</td></tr>');
                }
            });
        }

        function renderTable(credentials) {
            if (!credentials || credentials.length === 0) { renderEmpty(); return; }

            let html = '';
            credentials.forEach(function(c, i) {
                const statusBadge = c.is_active
                    ? '<span class="badge badge-success"><i class="fa-solid fa-check"></i> Active</span>'
                    : '<span class="badge badge-danger"><i class="fa-solid fa-times"></i> Inactive</span>';

                const typeBadge = getTypeBadge(c.auth_type);
                const consumerName = c.consumer_name || getConsumerName(c.consumer_id);
                
                // Get credential value based on auth type
                let valueDisplay = '<span style="color:var(--text-tertiary);font-size:12px;">-</span>';
                if (c.auth_type === 'api_key' && c.api_key) {
                    valueDisplay = '<span class="credential-value">' + escapeHtml(maskValue(c.api_key)) + '</span>';
                } else if (c.auth_type === 'jwt_secret' && c.jwt_secret) {
                    valueDisplay = '<span class="credential-value">' + escapeHtml(maskValue(c.jwt_secret)) + '</span>';
                } else if (c.auth_type === 'basic_auth' && c.username) {
                    valueDisplay = '<span class="credential-value">' + escapeHtml(c.username) + '</span>';
                }

                // Display username as identifier
                const identifier = c.username || '-';

                html += '<tr>' +
                    '<td>' + ((currentPage - 1) * 10 + i + 1) + '</td>' +
                    '<td><div class="consumer-chip"><i class="fa-solid fa-user"></i>' + escapeHtml(consumerName) + '</div></td>' +
                    '<td>' + typeBadge + '</td>' +
                    '<td><span style="font-size:12px;">' + escapeHtml(identifier) + '</span></td>' +
                    '<td>' + valueDisplay + '</td>' +
                    '<td>' + statusBadge + '</td>' +
                    '<td><div style="display:flex;gap:6px;">' +
                        '<button class="btn btn-sm btn-secondary" title="Edit" onclick="editCredential(' + c.id + ')"><i class="fa-solid fa-pen"></i></button>' +
                        '<button class="btn btn-sm btn-danger" title="Delete" onclick="deleteCredential(' + c.id + ')"><i class="fa-solid fa-trash"></i></button>' +
                    '</div></td>' +
                '</tr>';
            });

            $('#credentialTableBody').html(html);
        }

        function renderEmpty() {
            $('#credentialTableBody').html('<tr><td colspan="7"><div class="empty-state"><i class="fa-solid fa-key"></i><h4>No Credentials Yet</h4><p>Click <strong>Add Credential</strong> to create one</p></div></td></tr>');
            $('#credentialSubtitle').text('0 credentials');
            $('#paginationButtons').html('');
            $('#paginationInfo').text('Showing 0 - 0 of 0');
        }

        function renderPagination(pagination) {
            const page = pagination.page || 1;
            const total = pagination.total || 0;
            const limit = pagination.limit || 10;
            totalPages = Math.ceil(total / limit);

            const from = total === 0 ? 0 : (page - 1) * limit + 1;
            const to = Math.min(page * limit, total);

            $('#paginationInfo').text('Showing ' + from + ' - ' + to + ' of ' + total);

            let html = '';
            if (totalPages > 1) {
                html += '<button ' + (page <= 1 ? 'disabled' : '') + ' onclick="loadCredentials(' + (page - 1) + ')"><i class="fa-solid fa-chevron-left"></i></button>';
                for (let p = 1; p <= totalPages; p++) {
                    if (p === 1 || p === totalPages || (p >= page - 1 && p <= page + 1)) {
                        html += '<button class="' + (p === page ? 'active' : '') + '" onclick="loadCredentials(' + p + ')">' + p + '</button>';
                    } else if (p === page - 2 || p === page + 2) {
                        html += '<span style="padding:0 8px;color:var(--text-tertiary);">...</span>';
                    }
                }
                html += '<button ' + (page >= totalPages ? 'disabled' : '') + ' onclick="loadCredentials(' + (page + 1) + ')"><i class="fa-solid fa-chevron-right"></i></button>';
            }
            $('#paginationButtons').html(html);
        }

        function getConsumerName(consumerId) {
            const c = consumers.find(function(c) { return c.id === consumerId; });
            return c ? c.consumer_name : 'Unknown';
        }

        function getTypeBadge(type) {
            const badges = {
                'api_key': '<span class="credential-type api_key"><i class="fa-solid fa-key"></i> API Key</span>',
                'jwt_secret': '<span class="credential-type jwt"><i class="fa-solid fa-shield-halved"></i> JWT Secret</span>',
                'oauth2': '<span class="credential-type oauth2"><i class="fa-solid fa-right-to-bracket"></i> OAuth2</span>',
                'basic_auth': '<span class="credential-type basic"><i class="fa-solid fa-lock"></i> Basic Auth</span>'
            };
            return badges[type] || '<span class="credential-type api_key">' + escapeHtml(type || 'Unknown') + '</span>';
        }

        function maskValue(value) {
            if (!value || value.length < 8) return value;
            return value.substring(0, 6) + '...' + value.substring(value.length - 4);
        }

        function handleSearch() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(function() {
                loadCredentials(1);
            }, 300);
        }

        function openAddModal() {
            editingId = null;

            // Init Select2 if not already
            if (!$('#credConsumer').hasClass('select2-hidden-accessible')) {
                $('#credConsumer').select2({ theme: 'default', placeholder: '-- Select consumer --' });
            }
            if (!$('#credType').hasClass('select2-hidden-accessible')) {
                $('#credType').select2({ theme: 'default' });
            }

            $('#modalTitle').text('Add Credential');
            $('#credentialId').val('');
            $('#credConsumer').val('').trigger('change.select2');
            $('#credType').val('api_key').trigger('change.select2');
            $('#credUsername').val('');
            $('#credSecret').val('').attr('placeholder', 'Enter secret value').attr('type', 'password');
            $('#credIsActive').prop('checked', true);
            $('#btnSaveText').text('Save');
            $('#btnSaveCredential').removeClass('btn-warning').addClass('btn-primary');

            $('#credentialModal').addClass('active');
        }

        function editCredential(id) {
            // Init Select2 if not already
            if (!$('#credConsumer').hasClass('select2-hidden-accessible')) {
                $('#credConsumer').select2({ theme: 'default', placeholder: '-- Select consumer --' });
            }
            if (!$('#credType').hasClass('select2-hidden-accessible')) {
                $('#credType').select2({ theme: 'default' });
            }

            $.ajax({
                url: CRED_API + '/' + id,
                method: 'GET',
                headers: getHeaders(),
                success: function(r) {
                    if (r.success && r.data) {
                        const c = r.data;
                        editingId = id;
                        $('#modalTitle').text('Edit Credential');
                        $('#credentialId').val(c.id);
                        $('#credConsumer').val(c.consumer_id).trigger('change.select2');
                        $('#credType').val(c.auth_type || 'api_key').trigger('change.select2');
                        $('#credUsername').val(c.username || '');
                        $('#credSecret').val('').attr('placeholder', '•••••••• (leave blank to keep current)').attr('type', 'password');
                        $('#credIsActive').prop('checked', c.is_active !== false);
                        $('#btnSaveText').text('Update');
                        $('#btnSaveCredential').removeClass('btn-primary').addClass('btn-warning');
                        $('#credentialModal').addClass('active');
                    }
                },
                error: function() { showError('Error', 'Failed to load credential data'); }
            });
        }

        function closeModal() {
            $('#credentialModal').removeClass('active');
            editingId = null;
        }

        function generateSecret() {
            const chars = 'ABCDEFGHIJKLMNOPQRSTUVWXYZabcdefghijklmnopqrstuvwxyz0123456789!@#$%^&*';
            let secret = '';
            for (let i = 0; i < 48; i++) {
                secret += chars.charAt(Math.floor(Math.random() * chars.length));
            }
            $('#credSecret').val(secret).attr('type', 'text');
            showToast('Secret generated!', 'success');
        }

        function saveCredential() {
            const consumerId = parseInt($('#credConsumer').val());
            if (!consumerId) { showWarning('Please select a consumer'); return; }

            const username = $('#credUsername').val().trim();
            if (!username) {
                showWarning('Username is required');
                return;
            }

            const secret = $('#credSecret').val().trim();
            if (!editingId && !secret) {
                showWarning('Secret value is required for new credentials');
                return;
            }

            const payload = {
                consumer_id: consumerId,
                auth_type: $('#credType').val(),
                username: username,
                is_active: $('#credIsActive').is(':checked')
            };

            // Add secret based on auth type
            const authType = $('#credType').val();
            if (authType === 'api_key') {
                payload.api_key = secret;
            } else if (authType === 'jwt_secret') {
                payload.jwt_secret = secret;
            } else if (authType === 'basic_auth') {
                payload.password = secret;
            }

            const btn = $('#btnSaveCredential');
            const orig = btn.html();
            btn.prop('disabled', true).html('<i class="fa-solid fa-spinner fa-spin"></i> Saving...');

            const method = editingId ? 'PUT' : 'POST';
            const url = editingId ? CRED_API + '/' + editingId : CRED_API;

            $.ajax({
                url: url,
                method: method,
                headers: getHeaders(),
                contentType: 'application/json',
                data: JSON.stringify(payload),
                success: function() {
                    closeModal();
                    showToast(editingId ? 'Credential updated successfully' : 'Credential created successfully', 'success');
                    loadCredentials(currentPage);
                },
                error: function(xhr) {
                    showError('Error', xhr.responseJSON?.message || 'Failed to save');
                },
                complete: function() {
                    btn.prop('disabled', false).html(orig);
                }
            });
        }

        function deleteCredential(id) {
            showConfirm('Delete Credential', 'Are you sure you want to delete this credential? This action cannot be undone.', 'Yes, Delete', 'Cancel').then(function(result) {
                if (result.isConfirmed) {
                    $.ajax({
                        url: CRED_API + '/' + id,
                        method: 'DELETE',
                        headers: getHeaders(),
                        success: function() { showToast('Credential deleted', 'success'); loadCredentials(currentPage); },
                        error: function(xhr) { showError('Error', xhr.responseJSON?.message || 'Failed to delete'); }
                    });
                }
            });
        }
    </script>
</body>
</html>
